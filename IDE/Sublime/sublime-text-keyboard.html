    <h5 id="常用的快捷键"><a href="#常用的快捷键" class="headerlink" title="常用的快捷键"></a>常用的快捷键</h5><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br></pre></td><td class="code"><pre><span class="line">Ctrl+L 选择整行（按住-继续选择下行）</span><br><span class="line">Ctrl+KK 从光标处删除至行尾</span><br><span class="line">Ctrl+K Backspace 从光标处删除至行首</span><br><span class="line">Ctrl+J 合并行（已选择需要合并的多行时）</span><br><span class="line">Ctrl+KU 改为大写</span><br><span class="line">Ctrl+KL 改为小写</span><br><span class="line">Ctrl+D 选择字符串 （按住-继续选择下个相同的字符串）</span><br><span class="line">Ctrl+Shift+D 复制光标所在整行，插入在该行之前 </span><br><span class="line">Ctrl+M 光标移动至括号内开始或结束的位置</span><br><span class="line">Ctrl+Shift+M 选择括号内的内容（按住-继续选择父括号）</span><br><span class="line">Ctrl+&#x2F; 注释整行（如已选择内容，同“Ctrl+Shift+&#x2F;”效果）</span><br><span class="line">Ctrl+Shift+c转换为utf8</span><br><span class="line">Ctrl+R 搜索指定文件的函数标签</span><br><span class="line">Ctrl+G 跳转到指定行</span><br><span class="line">Ctrl+KT 折叠属性</span><br><span class="line">Ctrl+K0 展开所有</span><br><span class="line">Ctrl+U 软撤销</span><br><span class="line">Ctrl+T 词互换</span><br><span class="line">Tab 缩进 自动完成</span><br><span class="line">Shift+Tab 去除缩进</span><br><span class="line">Ctrl+Enter 光标后插入行</span><br><span class="line">Ctrl+F2 设置书签</span><br><span class="line">F2 下一个书签</span><br><span class="line">Shift+F2 上一个书签</span><br><span class="line">shift+鼠标右键 列选择</span><br><span class="line">Alt+F3 选中文本按下快捷键，即可一次性选择全部的相同文本进行同时编辑</span><br><span class="line">Alt+. 闭合当前标签</span><br><span class="line">F6 检测语法错误</span><br><span class="line">F9 行排序(按a-z)</span><br><span class="line">F11 全屏模式</span><br><span class="line">Ctrl+Shift+Enter 光标前插入行</span><br><span class="line">Ctrl+Shift+[ 折叠代码</span><br><span class="line">Ctrl+Shift+] 展开代码</span><br><span class="line">Ctrl+Shift+↑ 与上行互换</span><br><span class="line">Ctrl+Shift+↓ 与下行互换</span><br><span class="line">Ctrl+Shift+A 选择光标位置父标签对儿</span><br><span class="line"></span><br><span class="line">ctrl+shift+F 在文件夹内查找，与普通编辑器不同的地方是sublime允许添加多个文件夹进行查找</span><br><span class="line">Ctrl+Shift+K 删除整行</span><br><span class="line">Ctrl+Shift+L 鼠标选中多行（按下快捷键），即可同时编辑这些行</span><br><span class="line">Ctrl+Shift+M 选择括号内的内容（按住-继续选择父括号）</span><br><span class="line">Ctrl+Shift+P 打开命令面板</span><br><span class="line">Ctrl+Shift+&#x2F; 注释已选择内容</span><br><span class="line">Ctrl+Shift+Enter 光标前插入行</span><br><span class="line">Ctrl+PageDown 、Ctrl+PageUp 文件按开启的前后顺序切换</span><br><span class="line">Ctrl+鼠标左键 可以同时选择要编辑的多处文本</span><br><span class="line">Shift+鼠标右键（或使用鼠标中键）可以用鼠标进行竖向多行选择</span><br><span class="line">Shift+Tab 去除缩进</span><br><span class="line">Alt+Shift+1~9（非小键盘）屏幕显示相等数字的小窗口</span><br></pre></td></tr></table></figure>


  </div>
